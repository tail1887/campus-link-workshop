name: Sync PR Branch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-with-main:
    if: >
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: sync-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge main into PR branch
        id: sync
        continue-on-error: true
        shell: bash
        run: |
          git fetch origin main
          set +e
          git merge --no-edit origin/main
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git merge --abort || true
            exit "$status"
          fi
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Comment on merge conflict
        if: steps.sync.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "자동 \`main\` 병합 중 충돌이 발생했습니다. 로컬에서 \`git fetch origin && git merge origin/main\` 으로 충돌을 해결한 뒤 다시 push 해주세요."

      - name: Fail workflow on merge conflict
        if: steps.sync.outcome == 'failure'
        run: exit 1
